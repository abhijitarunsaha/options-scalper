<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Option Scalper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      /* ink (dark) */
      --bg:#0B0E15;--bg2:#10141E;--bg3:#151B28;--bg4:#1B2231;--bg5:#222A3C;
      --panel:rgba(255,255,255,0.03);--panel2:rgba(255,255,255,0.05);
      --border:rgba(160,172,204,0.12);--border2:rgba(160,172,204,0.20);
      --text:#E9ECF5;--text2:#93A0BC;--muted:#5A6480;--muted2:#2A3040;
      --shadow:0 4px 20px rgba(0,0,0,0.35);--shadow2:0 12px 36px rgba(0,0,0,0.45);
      --radius:10px;--radius2:14px;--radius3:20px;

      /* brand + domain accents */
      --brand:#5B7CFA;--brandDim:rgba(91,124,250,0.14);--brandGlow:rgba(91,124,250,0.35);
      --accent:#5B7CFA;--accent2:#8B6CF0;--accent3:#2FBE83;
      --bull:#2FBE83;--bullDim:rgba(47,190,131,0.14);--bullGlow:rgba(47,190,131,0.35);
      --bear:#E1495F;--bearDim:rgba(225,73,95,0.14);--bearGlow:rgba(225,73,95,0.35);
      --watch:#E8A33D;--watchDim:rgba(232,163,61,0.14);--watchGlow:rgba(232,163,61,0.35);
      /* legacy aliases used across existing components */
      --green:var(--bull);--greenDim:var(--bullDim);--greenGlow:var(--bullGlow);
      --red:var(--bear);--redDim:var(--bearDim);--redGlow:var(--bearGlow);
      --gold:var(--watch);--goldDim:var(--watchDim);
      --blue:var(--brand);--blueDim:var(--brandDim);
      --glass:var(--panel);--glass2:var(--panel2);

      --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;
    }
    body.light-mode{
      --bg:#F5F6FB;--bg2:#FFFFFF;--bg3:#F0F2F9;--bg4:#E7EAF4;--bg5:#DCE0EF;
      --panel:rgba(20,24,40,0.03);--panel2:rgba(20,24,40,0.045);
      --border:rgba(20,24,40,0.08);--border2:rgba(20,24,40,0.14);
      --text:#141826;--text2:#57607A;--muted:#8891A8;--muted2:#E7EAF4;
      --shadow:0 4px 20px rgba(20,24,50,0.06);--shadow2:0 12px 32px rgba(20,24,50,0.10);
      --brand:#3F5FE0;--accent:#3F5FE0;--accent2:#7454D6;--accent3:#1E9E6B;
      --bull:#1E9E6B;--bullDim:rgba(30,158,107,0.12);
      --bear:#C93B50;--bearDim:rgba(201,59,80,0.12);
      --watch:#C8862A;--watchDim:rgba(200,134,42,0.12);
      --green:var(--bull);--greenDim:var(--bullDim);
      --red:var(--bear);--redDim:var(--bearDim);
      --gold:var(--watch);--goldDim:var(--watchDim);
      --blue:var(--brand);--blueDim:rgba(63,95,224,0.10);
      --glass:var(--panel);--glass2:var(--panel2);
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:13px;line-height:1.5;overflow-x:hidden;transition:background .25s,color .25s}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    input,select,button,textarea{font-family:var(--font-body)}
    button{cursor:pointer}
    :focus-visible{outline:2px solid var(--brand);outline-offset:2px}
    @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}

    /* Signature: regime confirmation ring keyframes */
    @keyframes ringSweep{ to{ stroke-dashoffset:0; } }
    @keyframes ringSqueeze{ 0%,100%{ r:15; } 50%{ r:11; } }
    @keyframes ringBreathe{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
  </style>
</head>
<body><div id="root"></div></body>
</html>
